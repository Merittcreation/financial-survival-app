function calcDays(cash,expenses){
  if(!cash||cash<=0)return 0;
  if(!expenses||expenses<=0)return 999;
  return Math.floor(cash/(expenses/30));
}
function getStatus(days){
  if(days<30)  return{tier:'critical',tc:'text-red-400',   bc:'border-red-500',   bg:'bg-red-500/10',   bar:'bg-red-500',   glow:'rgba(239,68,68,.3)',  tagBg:'bg-red-500/15 border-red-500/40'};
  if(days<90)  return{tier:'risky',   tc:'text-amber-400', bc:'border-amber-500', bg:'bg-amber-500/10', bar:'bg-amber-500', glow:'rgba(245,158,11,.3)', tagBg:'bg-amber-500/15 border-amber-500/40'};
  return             {tier:'stable',  tc:'text-emerald-400',bc:'border-emerald-500',bg:'bg-emerald-500/10',bar:'bg-emerald-500',glow:'rgba(16,185,129,.3)',tagBg:'bg-emerald-500/15 border-emerald-500/40'};
}
function buildRoutes(data,t){
  const base=calcDays(data.cash,data.expenses);
  const mk=(id,cut,mult,colorKey,rk)=>({
    id, cut:`${cut}%`, mult,
    ...(rk==='a'?t.routeA:rk==='b'?t.routeB:t.routeC),
    ...(colorKey==='green' ?{cb:'border-emerald-500/40',at:'text-emerald-400',ab:'bg-emerald-500/10',bar:'bg-emerald-500',btn:'bg-emerald-600 hover:bg-emerald-500'}:
        colorKey==='amber' ?{cb:'border-amber-500/40',  at:'text-amber-400',  ab:'bg-amber-500/10',  bar:'bg-amber-500',  btn:'bg-amber-600 hover:bg-amber-500'}:
                            {cb:'border-rose-500/40',   at:'text-rose-400',   ab:'bg-rose-500/10',   bar:'bg-rose-500',   btn:'bg-rose-700 hover:bg-rose-600'}),
    newExp:data.expenses*mult,
    newDays:calcDays(data.cash,data.expenses*mult),
    gain:calcDays(data.cash,data.expenses*mult)-base,
    actions:(rk==='a'?t.actionsA:rk==='b'?t.actionsB:t.actionsC)(data),
  });
  return[mk('a',15,.85,'green','a'),mk('b',30,.70,'amber','b'),mk('c',50,.50,'rose','c')];
}
function buildWeeks(base,route,t,n=8){
  return Array.from({length:n},(_,i)=>{
    const gained=Math.floor(route.gain*Math.pow((i+1)/n,0.65));
    return{week:i+1,days:base+gained,gained,label:t.weekLabels[i]};
  });
}
function fmtC(n,lang){
  return lang==='th'
    ? new Intl.NumberFormat('th-TH',{style:'currency',currency:'THB',maximumFractionDigits:0}).format(n)
    : new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n);
}

function LangToggle({lang,setLang}){
  return(

      {['en','th'].map(l=>(

          className={`px-3 py-1 rounded-full text-xs font-bold transition-all duration-200 ${lang===l?'bg-emerald-500 text-white shadow':'text-slate-400 hover:text-slate-200'}`}>
          {l==='en'?'EN':'ไทย'}
        </button>
      ))}
    </div>
  );
}

function useCountUp(target,ms=1400){
  const[v,setV]=useState(0);
  useEffect(()=>{
    if(target<=0)return;
    const steps=Math.min(target,80); let cur=0;
    const ti=setInterval(()=>{
      cur+=target/steps;
      if(cur>=target){setV(target);clearInterval(ti);}
      else setV(Math.floor(cur));
    },ms/steps);
    return()=>clearInterval(ti);
  },[target]);
  return v;
}

const FIELD_IDS=['cash','income','expenses','debt'];
const FIELD_REQ={cash:true,income:true,expenses:true,debt:false};

function InputScreen({onSubmit,onBack,lang,setLang}){
  const t=T[lang];
  const[vals,setVals]=useState({cash:'',income:'',expenses:'',debt:''});
  const[errs,setErrs]=useState({});
  const[focus,setFocus]=useState(null);
  const firstRef=useRef(null);
  useEffect(()=>{firstRef.current?.focus();},[]);
  const change=(id,raw)=>{setVals(p=>({...p,[id]:raw.replace(/[^0-9]/g,'')}));if(errs[id])setErrs(p=>({...p,[id]:null}));};
  const disp=id=>{const v=vals[id];if(!v)return'';return focus===id?v:new Intl.NumberFormat('en-US').format(v);};
  const submit=e=>{
    e.preventDefault();
    const e2={};
    FIELD_IDS.filter(f=>FIELD_REQ[f]).forEach(f=>{if(!vals[f])e2[f]=t.required;});
    if(Object.keys(e2).length){setErrs(e2);return;}
    onSubmit({cash:+vals.cash||0,income:+vals.income||0,expenses:+vals.expenses||0,debt:+vals.debt||0});
  };
  return(
    <div className="min-h-screen flex flex-col px-6 py-10">
      <div className="anim-fiu flex items-center justify-between mb-8">
        <button onClick={onBack} className="text-slate-500 hover:text-slate-300 text-sm transition-colors">{t.back}</button>
        <LangToggle lang={lang} setLang={setLang}/>
      </div>
      <div className="anim-fiu d1 mb-8">
        <div className="flex items-center gap-2 mb-4">
          <div className="w-7 h-7 bg-emerald-500 rounded-lg flex items-center justify-center text-xs">⚡</div>
          <span className="text-xs font-black text-emerald-400 uppercase tracking-widest">{t.yourNumbers}</span>

        <h1 className="text-2xl font-extrabold text-white leading-tight mb-1">{t.inputTitle}</h1>

          <div key={id} className={`anim-fiu d${i+1}`}>
            <label className="block text-sm font-semibold text-slate-300 mb-1.5">
              {['💰','💵','📊','📋'][i]}&nbsp;{t.fieldLabels[id]}
              {FIELD_REQ[id]&&<span className="text-red-400 ml-1">*</span>}

            <div className={`flex items-center rounded-xl border transition-all duration-200 ${focus===id?'border-emerald-500 bg-slate-800/80 shadow-lg shadow-emerald-500/10':errs[id]?'border-red-500/70 bg-slate-900/80':'border-slate-700/60 bg-slate-900 hover:border-slate-600'}`}>

const KEY='fsa_v3';
function App(){
  const[screen,setScreen]=useState('landing');
  const[data,setData]=useState(null);
  const[route,setRoute]=useState(null);
  const[lang,setLang]=useState('en');

  useEffect(()=>{
    try{
      const s=JSON.parse(localStorage.getItem(KEY));
      if(s?.data){
        setData(s.data);
        setRoute(s.route||null);
        // Never restore to 'routes' screen — it's transient and can loop-crash
        const sc=s.screen==='progress'&&s.route?'progress':'result';
        setScreen(sc);
        setLang(s.lang||'en');
      }
    }catch{}
  },[]);

  const save=(d,r,sc,lg)=>{try{localStorage.setItem(KEY,JSON.stringify({data:d,route:r,screen:sc,lang:lg}));}catch{}};
  const go=(sc,d=data,r=route,lg=lang)=>{setScreen(sc);save(d,r,sc,lg);};
  const changeLang=(l)=>{setLang(l);save(data,route,screen,l);};
  const submit=d=>{setData(d);setRoute(null);go('result',d,null,lang);};
  const choose=r=>{setRoute(r);go('progress',data,r,lang);};
  const reset=()=>{setData(null);setRoute(null);setScreen('landing');localStorage.removeItem(KEY);};

  const props={lang,setLang:changeLang};
  return(
    <div className="min-h-screen bg-slate-950 text-white" style={{fontFamily:"'Inter','Sarabun',sans-serif"}}>
      <div className="max-w-md mx-auto min-h-screen">
        {screen==='landing'  &&<LandingScreen  onStart={()=>go('input')} {...props}/>}
        {screen==='input'    &&<InputScreen    onSubmit={submit} onBack={()=>go('landing')} {...props}/>}
        {screen==='result'   &&data&&<ResultScreen   data={data} onContinue={()=>go('routes')} onReset={reset} {...props}/>}
        {screen==='routes'   &&data&&<RoutesScreen   data={data} onChoose={choose} onBack={()=>go('result')} {...props}/>}
        {screen==='progress' &&data&&route&&<ProgressScreen data={data} route={route} onBack={()=>go('routes')} onReset={reset} {...props}/>}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
